    <style>
        :root {
            --bg-color: #080808;
            --panel-color: #141414;
            --primary-red: #E50914;
            --hover-red: #B20710;
        }
        body { 
            background-color: var(--bg-color); 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        /* --- شاشة التحميل الفورية (Splash Screen) --- */
        #nox-splash {
            position: fixed;
            inset: 0;
            background-color: var(--bg-color);
            z-index: 99999999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .nox-logo-splash {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.05em;
        }
        .nox-logo-splash span {
            color: var(--primary-red);
        }
        .nox-spinner {
            margin-top: 1.5rem;
            width: 45px;
            height: 45px;
            border: 4px solid #222;
            border-top-color: var(--primary-red);
            border-radius: 50%;
            animation: nox-spin 0.8s linear infinite;
        }
        @keyframes nox-spin { 
            to { transform: rotate(360deg); } 
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #141414; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
        
        .solid-bg { background-color: var(--bg-color); }
        .solid-panel { background-color: var(--panel-color); }
        .primary-red-bg { background-color: var(--primary-red); }
        .primary-red-text { color: var(--primary-red); }
        
        ::selection { background: var(--primary-red); color: white; }
        
        *:focus { outline: none !important; box-shadow: none !important; }
        a, button { text-decoration: none !important; }
        
        .red-stroke { border: 2px solid var(--primary-red); }
        
        .tab-btn { background: #262626; color: #a3a3a3; transition: all 0.2s ease; }
        .tab-btn.active { background: var(--primary-red); color: #fff; font-weight: bold; }
        
        * { -webkit-tap-highlight-color: transparent !important; }
        button:focus, select:focus { outline: none !important; box-shadow: none !important; }

        /* Fullscreen modifications for iframe */
        .fullscreen-container {
            width: 100vw !important;
            height: 100vh !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            z-index: 999999 !important;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .css-rotate-90 {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            width: 100vh !important;
            height: 100vw !important;
            transform: translate(-50%, -50%) rotate(90deg) !important;
            z-index: 999999 !important;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Native App Bottom Sheet Animation */
        @keyframes slideUp {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Smart overlay for iframe touch detection */
        .touch-overlay {
            position: absolute;
            inset: 0;
            z-index: 999998;
        }
        .touch-overlay.active {
            pointer-events: auto;
        }
        .touch-overlay.inactive {
            pointer-events: none;
        }
    </style>
</head>

            const year = (item.release_date || item.first_air_date || '').split('-')[0];
            const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';

            return (
                <div onClick={() => onClick(item.id, type)} className="min-w-[130px] w-[130px] md:w-[150px] flex-shrink-0 cursor-pointer group">
                    <div className="relative rounded-lg overflow-hidden aspect-[2/3] solid-panel">
                        {item.poster_path ? (
                            <img src={`${IMG_URL}${item.poster_path}`} alt={title} className="w-full h-full object-cover" loading="lazy" />
                        ) : (
                            <div className="w-full h-full flex items-center justify-center text-gray-600 text-xs text-center p-2">{title}</div>
                        )}
                        <div className="absolute top-1 right-1 bg-black/80 text-white text-[10px] px-1.5 py-0.5 rounded flex items-center gap-1 font-bold">
                            <Icons.Star /> {rating}
                        </div>
                        <div className="absolute top-1 left-1 bg-red-600 text-white text-[9px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wider">
                            {type === 'movie' ? langObj.movies : langObj.tv}
                        </div>
                    </div>
                    <div className="mt-2">
                        <h3 className="text-gray-100 text-xs font-bold truncate tracking-wide" dir="ltr">{title}</h3>
                        <p className="text-gray-500 text-[10px] mt-0.5 font-medium">{year}</p>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [lang, setLang] = useState(null);
            const [page, setPage] = useState('home');
            const [filter, setFilter] = useState('all'); 
            const [currentParams, setCurrentParams] = useState(null);
            const [watchlist, setWatchlist] = useState([]);
            const [showLangModal, setShowLangModal] = useState(false);

            useEffect(() => {
                // إخفاء شاشة التحميل (Splash Screen) برمجياً بعد تحميل التطبيق
                const splash = document.getElementById('nox-splash');
                if (splash) {
                    setTimeout(() => {
                        splash.style.opacity = '0';
                        setTimeout(() => splash.remove(), 400);
                    }, 100);
                }

                // التحقق من اللغة المحفوظة وإلا ستظهر شاشة اختيار اللغة
                const savedLang = localStorage.getItem('noxflix_lang');
                if (savedLang && i18n[savedLang]) {
                    setLang(savedLang);
                }
                
                const savedList = JSON.parse(localStorage.getItem('noxflix_watchlist') || '[]');
                setWatchlist(savedList);
            }, []);

            const changeLang = (l) => {
                setLang(l);
                localStorage.setItem('noxflix_lang', l);
                setShowLangModal(false);
            };

            const toggleSave = (item, type) => {
                const isSaved = watchlist.some(w => w.id === item.id);
                let newList = isSaved ? watchlist.filter(w => w.id !== item.id) : [...watchlist, { ...item, _type: type }];
                setWatchlist(newList);
                localStorage.setItem('noxflix_watchlist', JSON.stringify(newList));
            };

            const navigate = (pageName, params = null) => {
                setPage(pageName);
                setCurrentParams(params);
                window.scrollTo(0, 0);
            };

            // شاشة اختيار اللغة التي تظهر في المرة الأولى فقط
            if (!lang) {
                return (
                    <div className="min-h-screen solid-bg flex flex-col items-center p-6 text-white justify-center relative z-50">
                        <h1 className="text-4xl font-black mb-10 tracking-tighter">NOX<span className="text-red-600">FLIX</span></h1>
                        <div className="grid grid-cols-2 gap-4 w-full max-w-[300px]">
                            {Object.keys(i18n).map(k => (
                                <button key={k} onClick={() => changeLang(k)} className="solid-panel border border-[#333] hover:border-[#E50914] transition-all px-3 py-3 rounded-xl text-sm font-bold flex flex-col items-center justify-center gap-2 shadow-sm">
                                    <div className="w-10 h-7 rounded-sm overflow-hidden flex items-center justify-center shadow-md bg-[#222]">
                                        {i18n[k].flag}
                                    </div>
                                    <span className="text-gray-300 text-xs">{i18n[k].name}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            const t = i18n[lang];
            const isRTL = t.dir === 'rtl';

            const HomeView = () => (
                <div className="pb-24">
                    <AdBanner />
                    <AppHeader langObj={t} onLangClick={() => setShowLangModal(true)} />

                    <div className="mx-4 mt-5 bg-[#E50914] rounded-xl overflow-hidden relative shadow-lg border border-[#ff3333]">
                        <Icons.Telegram className="absolute -right-6 -bottom-6 w-48 h-48 text-black opacity-10 pointer-events-none" />
                        <div className="p-6 relative z-10 flex flex-col items-start gap-4">
                            <p className="text-base sm:text-lg font-black text-white leading-tight drop-shadow-md">
                                {t.notice}
                            </p>
                            <a href={t.channel} target="_blank" className="inline-flex items-center justify-center bg-white text-black text-sm font-black px-6 py-2.5 rounded-lg hover:bg-gray-200 transition-colors uppercase tracking-wider shadow-md">
                                {t.btn}
                            </a>
                        </div>
                    </div>

                    <div className="px-4 mt-6 flex gap-2 overflow-x-auto hide-scrollbar">
                        {['all', 'movie', 'tv'].map(f => (
                            <button key={f} onClick={() => setFilter(f)} 
                                className={`px-5 py-2 rounded-md text-xs tracking-wider uppercase ${filter === f ? 'active' : ''} tab-btn`}>
                                {f === 'all' ? t.all : f === 'movie' ? t.movies : t.tv}
                            </button>
                        ))}
                    </div>

                    <div className="mt-6 flex flex-col gap-8">
                        {SECTIONS.map(sec => (
                            <SectionRow key={sec.id} section={sec} filter={filter} t={t} onCardClick={(id, type) => navigate('details', {id, type})} />
                        ))}
                    </div>
                </div>
            );

            const SectionRow = ({ section, filter, t, onCardClick }) => {
                const [items, setItems] = useState([]);
                const [loading, setLoading] = useState(true);

                useEffect(() => {
                    let isMounted = true;
                    const load = async () => {
                        setLoading(true);
                        try {
                            const pageNo = Math.floor(Math.random() * 3) + 1;
                            let res;
                            if (filter === 'all') {
                                const [r1, r2] = await Promise.all([
                                    fetchAPI(`/discover/movie`, { with_genres: section.genreId, page: pageNo, sort_by: 'popularity.desc' }),
                                    fetchAPI(`/discover/tv`, { with_genres: section.genreId, page: pageNo, sort_by: 'popularity.desc' })
                                ]);
                                const mixed = [];
                                const max = Math.max(r1.results?.length || 0, r2.results?.length || 0);
                                for(let i=0; i<max; i++){
                                    if(r1.results?.[i]) mixed.push({...r1.results[i], media_type: 'movie'});
                                    if(r2.results?.[i]) mixed.push({...r2.results[i], media_type: 'tv'});
                                }
                                res = { results: mixed };
                            } else {
                                res = await fetchAPI(`/discover/${filter}`, { with_genres: section.genreId, page: pageNo, sort_by: 'popularity.desc' });
                            }
                            if (isMounted) setItems(res.results?.slice(0, 12) || []);
                        } catch (e) { console.error(e); } 
                        finally { if (isMounted) setLoading(false); }
                    };
                    load();
                    return () => { isMounted = false };
                }, [filter, section.id]);

                if (loading) return <Loader />;
                if (items.length === 0) return null;

                return (
                    <div>
                        <div className="px-4 flex justify-between items-baseline mb-3">
                            <h2 className="text-lg font-bold text-gray-100 tracking-wide">{t.genres[section.id]}</h2>
                            <button onClick={() => navigate('seeAll', {section, filter})} className="text-[#E50914] text-xs font-bold uppercase tracking-wider hover:text-white transition-colors">
                                {t.seeAll}
                            </button>
                        </div>
                        <div className="px-4 flex gap-3 overflow-x-auto hide-scrollbar pb-2">
                            {items.map((item, idx) => (
                                <MovieCard key={`${item.id}-${idx}`} item={item} langObj={t} onClick={onCardClick} typeOverride={item.media_type || (filter !== 'all' ? filter : null)} />
                            ))}
                        </div>
                    </div>
                );
            };

            const DetailsView = () => {
                const { id, type } = currentParams;
                const [data, setData] = useState(null);
                const [overview, setOverview] = useState('');
                const [loading, setLoading] = useState(true);

                useEffect(() => {
                    const load = async () => {
                        setLoading(true);
                        try {
                            const res = await fetchAPI(`/${type}/${id}`, { append_to_response: 'external_ids,videos,credits' }, 'en-US');
                            setData(res);
                            
                            let desc = res.overview;
                            if (t.iso !== 'en') {
                                try {
                                    const locRes = await fetchAPI(`/${type}/${id}`, {}, t.iso);
                                    if (locRes.overview && locRes.overview.trim() !== '') {
                                        desc = locRes.overview;
                                    }
                                } catch(e) {}
                            }
                            setOverview(desc);
                        } catch (e) { console.error(e); } 
                        finally { setLoading(false); }
                    };
                    load();
                }, [id, type, t.iso]);

                if (loading) return <div className="min-h-screen flex items-center"><Loader /></div>;
                if (!data) return <div className="p-4">Error loading details.</div>;

                const title = data.original_title || data.original_name || data.title || data.name;
                const year = (data.release_date || data.first_air_date || '').split('-')[0];
                const trailer = data.videos?.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                const isSaved = watchlist.some(w => w.id === data.id);
                const imdbId = data.external_ids?.imdb_id;

                const openPlayerWithAd = () => {
                    if(!imdbId) {
                        alert('IMDB ID not available.');
                        return;
                    }
                    
                    const proceed = () => navigate('player', { id, type, imdbId, title, seasons: data.number_of_seasons });
                    
                    if (window.Adsgram) {
                        const ad = window.Adsgram.init({ blockId: "int-36635" });
                        ad.show()
                          .then(() => proceed())
                          .catch(() => proceed());
                    } else {
                        proceed();
                    }
                };

                return (
                    <div className="pb-24 min-h-screen solid-bg relative">
                        <AdBanner />
                        
                        <div className="w-full aspect-video md:aspect-[21/9] relative">
                            {data.backdrop_path ? (
                                <img src={`${IMG_URL_ORIGINAL}${data.backdrop_path}`} className="w-full h-full object-cover opacity-60" />
                            ) : <div className="w-full h-full bg-[#111]"></div>}
                            <div className="absolute inset-0 bg-gradient-to-t from-[#080808] to-transparent"></div>
                            
                            <button onClick={() => navigate('home')} className="absolute top-4 left-4 z-10 p-2 bg-[#141414] rounded-full text-white shadow-lg border border-[#333]">
                                <Icons.Back rtl={isRTL} />
                            </button>
                        </div>

                        <div className="px-4 -mt-16 relative z-10">
                            <div className="flex gap-4 items-end mb-6">
                                <div className="w-28 md:w-36 flex-shrink-0 rounded-lg overflow-hidden border-2 border-[#333] shadow-xl solid-panel">
                                    {data.poster_path ? (
                                        <img src={`${IMG_URL}${data.poster_path}`} className="w-full h-full object-cover" />
                                    ) : <div className="w-full aspect-[2/3]"></div>}
                                </div>
                                <div className="pb-1">
                                    <h1 className="text-2xl md:text-3xl font-black text-white mb-2 leading-tight" dir="ltr">{title}</h1>
                                    <div className="flex flex-wrap items-center gap-2 text-xs font-bold text-gray-400 uppercase tracking-wider">
                                        <span className="flex items-center gap-1 text-yellow-500"><Icons.Star /> {data.vote_average?.toFixed(1)}</span>
                                        <span>•</span><span>{year}</span>
                                        {type === 'movie' && <span>• {data.runtime}m</span>}
                                        {type === 'tv' && <span>• {data.number_of_seasons} {t.seasons}</span>}
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-3 mb-6">
                                <button onClick={openPlayerWithAd} className="flex-1 primary-red-bg text-white font-bold py-3.5 rounded-lg flex justify-center items-center gap-2 uppercase tracking-wide">
                                    <Icons.Play /> {type === 'movie' ? t.watchMovie : t.watchTV}
                                </button>
                                <button onClick={() => toggleSave(data, type)} className={`w-14 flex justify-center items-center rounded-lg border-2 transition-colors ${isSaved ? 'bg-white border-white text-black' : 'solid-panel border-[#333] text-white hover:border-gray-500'}`}>
                                    <Icons.Save />
                                </button>
                            </div>

                            <div className="mb-8">
                                <h3 className="text-lg font-bold mb-3 text-white tracking-wide">{type === 'movie' ? t.descMovie : t.descTV}</h3>
                                <p className="text-gray-300 text-sm leading-relaxed font-medium">
                                    {overview || 'No localized description available.'}
                                </p>
                            </div>

                            {trailer && (
                                <div className="mb-8">
                                    <h3 className="text-lg font-bold mb-3 text-white tracking-wide uppercase">{t.trailer}</h3>
                                    <div className="aspect-video w-full rounded-lg overflow-hidden border border-[#333]">
                                        <iframe src={`https://www.youtube.com/embed/${trailer.key}`} className="w-full h-full border-0" allowFullScreen></iframe>
                                    </div>
                                </div>
                            )}

                            {data.credits?.cast?.length > 0 && (
                                <div className="mb-8">
                                    <h3 className="text-lg font-bold mb-3 text-white tracking-wide uppercase">{t.cast}</h3>
                                    <div className="flex gap-4 overflow-x-auto hide-scrollbar pb-2">
                                        {data.credits.cast.slice(0, 10).map(actor => (
                                            <div key={actor.id} className="w-[72px] flex-shrink-0 text-center">
                                                <div className="w-[72px] h-[72px] rounded-full overflow-hidden solid-panel mb-2 border border-[#333] mx-auto">
                                                    {actor.profile_path ? (
                                                        <img src={`${IMG_URL}${actor.profile_path}`} className="w-full h-full object-cover rounded-full" />
                                                    ) : <div className="w-full h-full bg-[#111] rounded-full flex justify-center items-center text-xs text-gray-500">?</div>}
                                                </div>
                                                <p className="text-[10px] font-bold text-gray-200 truncate" dir="ltr">{actor.original_name || actor.name}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const PlayerView = () => {
                const { id, type, imdbId, title, seasons } = currentParams;
                const [s, setS] = useState(1);
                const [e, setE] = useState(1);
                const [epCount, setEpCount] = useState(1);
                const [srv, setSrv] = useState(SERVERS[0]);
                const [isFullscreen, setIsFullscreen] = useState(false);
                const [cssRotate, setCssRotate] = useState(false);
                
                const [showSeasonModal, setShowSeasonModal] = useState(false);
                const [showEpisodeModal, setShowEpisodeModal] = useState(false);
                const [controlsVisible, setControlsVisible] = useState(false);
                
                const playerContainerRef = useRef(null);
                const hideControlsTimeout = useRef(null);

                useEffect(() => {
                    if (type === 'tv') {
                        fetchAPI(`/tv/${id}/season/${s}`)
                            .then(res => setEpCount(res.episodes?.length || 1))
                            .catch(() => setEpCount(24));
                    }
                }, [s, id, type]);

                const resetControlsTimeout = () => {
                    setControlsVisible(true);
                    if (hideControlsTimeout.current) clearTimeout(hideControlsTimeout.current);
                    hideControlsTimeout.current = setTimeout(() => {
                        setControlsVisible(false);
                    }, 3500); 
                };

                useEffect(() => {
                    if (isFullscreen) {
                        setControlsVisible(false);
                        if (hideControlsTimeout.current) clearTimeout(hideControlsTimeout.current);
                    }
                }, [isFullscreen]);

                const toggleFullscreen = async () => {
                    const container = playerContainerRef.current;
                    if (!container) return;

                    if (!isFullscreen) {
                        setIsFullscreen(true);
                        
                        if (window.Telegram && window.Telegram.WebApp) {
                            window.Telegram.WebApp.expand();
                        }

                        let locked = false;
                        try {
                            if (container.requestFullscreen) await container.requestFullscreen();
                            else if (container.webkitRequestFullscreen) await container.webkitRequestFullscreen();
                            else if (container.msRequestFullscreen) await container.msRequestFullscreen();
                            
                            if (window.screen && window.screen.orientation && window.screen.orientation.lock) {
                                await window.screen.orientation.lock('landscape');
                                locked = true;
                            }
                        } catch (err) {}

                        if (!locked && window.innerHeight > window.innerWidth) {
                            setCssRotate(true);
                        }
                    } else {
                        setIsFullscreen(false);
                        setCssRotate(false);
                        try {
                            if (document.exitFullscreen) await document.exitFullscreen();
                            else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
                            
                            if (window.screen && window.screen.orientation && window.screen.orientation.unlock) {
                                window.screen.orientation.unlock();
                            }
                        } catch (err) {}
                    }
                };

                useEffect(() => {
                    const handleFsChange = () => {
                        const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
                        if(!isFs) {
                            setIsFullscreen(false);
                            setCssRotate(false);
                        }
                    };
                    document.addEventListener('fullscreenchange', handleFsChange);
                    document.addEventListener('webkitfullscreenchange', handleFsChange);
                    return () => {
                        document.removeEventListener('fullscreenchange', handleFsChange);
                        document.removeEventListener('webkitfullscreenchange', handleFsChange);
                    };
                }, []);

                let embedUrl = type === 'tv' 
                    ? `${srv.baseTv}${imdbId}/${s}/${e}?autoplay=1&autoPlay=1` 
                    : `${srv.baseMovie}${imdbId}?autoplay=1&autoPlay=1`;

                const containerClass = isFullscreen 
                    ? (cssRotate ? "css-rotate-90" : "fullscreen-container") 
                    : "w-full bg-black relative overflow-hidden flex-shrink-0 shadow-2xl rounded-xl border-2 border-[#E50914] aspect-video group";

                return (
                    <div className="min-h-screen flex flex-col solid-bg">
                        <AdBanner />
                        
                        <header className="p-4 flex items-center gap-4 solid-panel border-b border-[#222] sticky top-[51px] z-50">
                             <button onClick={() => navigate('details', {id, type})} className="p-2 solid-bg rounded-lg border border-[#333] text-white hover:bg-[#333] transition-colors">
                                <Icons.Back rtl={isRTL} />
                            </button>
                            <h2 className="text-sm font-bold truncate text-gray-200 tracking-wide uppercase" dir="ltr">{title}</h2>
                        </header>

                        <div className="mx-auto w-full flex-1 flex flex-col p-4 max-w-6xl">
                            
                            <div className="mb-4 flex flex-row items-center justify-between gap-3">
                                <div className="flex gap-2 flex-1 overflow-x-auto hide-scrollbar">
                                    {SERVERS.map(server => (
                                        <button key={server.id} 
                                            onClick={() => setSrv(server)}
                                            className={`py-2.5 px-4 rounded-lg text-xs font-black uppercase transition-colors border-2 whitespace-nowrap ${srv.id === server.id ? 'bg-[#E50914] text-white border-[#E50914]' : 'bg-[#141414] text-gray-400 border-[#333] hover:text-white'}`}>
                                            {t.server} {server.id}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={toggleFullscreen} className="flex items-center justify-center gap-1.5 bg-[#222] hover:bg-[#333] text-white px-4 py-2.5 rounded-lg text-xs font-black transition-colors uppercase border border-[#444] shadow-md flex-shrink-0">
                                    {isFullscreen ? <Icons.Close /> : <Icons.Fullscreen />} <span className="hidden sm:inline">{t.fullscreen}</span>
                                </button>
                            </div>

                            <div ref={playerContainerRef} className={containerClass} onMouseMove={isFullscreen ? resetControlsTimeout : undefined}>
                                <iframe 
                                    src={embedUrl} 
                                    className="w-full h-full border-0 absolute inset-0" 
                                    allow="autoplay; fullscreen" 
                                    sandbox="allow-scripts allow-same-origin allow-presentation allow-forms"
                                    allowFullScreen>
                                </iframe>
                                
                                {isFullscreen && (
                                    <div 
                                        className={`touch-overlay ${controlsVisible ? 'inactive' : 'active'}`}
                                        onClick={(e) => { e.stopPropagation(); resetControlsTimeout(); }}
                                        onTouchStart={(e) => { e.stopPropagation(); resetControlsTimeout(); }}
                                    ></div>
                                )}

                                {isFullscreen && (
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); toggleFullscreen(); }} 
                                        className={`absolute top-4 right-4 sm:top-6 sm:right-6 z-[999999] bg-black/70 text-white p-3.5 rounded-full border border-white/20 hover:bg-[#E50914] transition-all duration-300 backdrop-blur-md ${controlsVisible ? 'opacity-100 translate-y-0 pointer-events-auto' : 'opacity-0 -translate-y-10 pointer-events-none'}`}>
                                        <Icons.Close />
                                    </button>
                                )}
                            </div>

                            {type === 'tv' && (
                                <div className="mt-6 flex gap-4 w-full">
                                    <div className="flex-1 relative cursor-pointer">
                                        <button onClick={() => setShowSeasonModal(true)} className="w-full bg-[#141414] border border-[#333] hover:border-[#E50914] text-white px-4 py-3 rounded-xl font-bold flex justify-between items-center transition-all shadow-md">
                                            <span className="text-sm truncate">{t.season} {s}</span>
                                            <Icons.ChevronDown />
                                        </button>
                                    </div>

                                    <div className="flex-1 relative cursor-pointer">
                                        <button onClick={() => setShowEpisodeModal(true)} className="w-full bg-[#141414] border border-[#333] hover:border-[#E50914] text-white px-4 py-3 rounded-xl font-bold flex justify-between items-center transition-all shadow-md">
                                            <span className="text-sm truncate">{t.episode} {e}</span>
                                            <Icons.ChevronDown />
                                        </button>
                                    </div>
                                </div>
                            )}
                            
                            <NativeAd />
                            
                            {showSeasonModal && (
                                <div className="fixed inset-0 bg-black/80 z-[100] flex justify-center items-end" onClick={() => setShowSeasonModal(false)}>
                                    <div className="solid-panel w-full sm:max-w-md rounded-t-3xl border-t border-[#333] shadow-[0_-10px_40px_rgba(0,0,0,0.8)] flex flex-col max-h-[75vh] animate-slide-up" onClick={e => e.stopPropagation()}>
                                        <div className="w-12 h-1.5 bg-[#444] rounded-full mx-auto mt-3 mb-1"></div>
                                        <div className="px-5 py-4 border-b border-[#222] flex justify-between items-center">
                                            <h2 className="text-lg font-black text-white uppercase tracking-wider">{t.seasons}</h2>
                                            <button onClick={() => setShowSeasonModal(false)} className="text-gray-400 hover:text-white p-2 bg-[#222] rounded-full transition-colors">
                                                <Icons.Close />
                                            </button>
                                        </div>
                                        <div className="p-5 overflow-y-auto custom-scrollbar">
                                            <div className="grid grid-cols-4 sm:grid-cols-5 gap-3">
                                                {Array.from({length: seasons || 1}).map((_, i) => (
                                                    <button key={i+1} onClick={() => { setS(i+1); setE(1); setShowSeasonModal(false); }} 
                                                        className={`py-3.5 rounded-2xl font-black text-base transition-all ${s === i+1 ? 'bg-[#E50914] text-white shadow-[0_0_15px_rgba(229,9,20,0.4)]' : 'bg-[#222] text-gray-300 hover:bg-[#333]'}`}>
                                                        {i+1}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {showEpisodeModal && (
                                <div className="fixed inset-0 bg-black/80 z-[100] flex justify-center items-end" onClick={() => setShowEpisodeModal(false)}>
                                    <div className="solid-panel w-full sm:max-w-md rounded-t-3xl border-t border-[#333] shadow-[0_-10px_40px_rgba(0,0,0,0.8)] flex flex-col max-h-[75vh] animate-slide-up" onClick={e => e.stopPropagation()}>
                                        <div className="w-12 h-1.5 bg-[#444] rounded-full mx-auto mt-3 mb-1"></div>
                                        <div className="px-5 py-4 border-b border-[#222] flex justify-between items-center">
                                            <h2 className="text-lg font-black text-white uppercase tracking-wider">{t.episodes}</h2>
                                            <button onClick={() => setShowEpisodeModal(false)} className="text-gray-400 hover:text-white p-2 bg-[#222] rounded-full transition-colors">
                                                <Icons.Close />
                                            </button>
                                        </div>
                                        <div className="p-5 overflow-y-auto custom-scrollbar">
                                            <div className="grid grid-cols-4 sm:grid-cols-5 gap-3">
                                                {Array.from({length: epCount}).map((_, i) => (
                                                    <button key={i+1} onClick={() => { setE(i+1); setShowEpisodeModal(false); }} 
                                                        className={`py-3.5 rounded-2xl font-black text-base transition-all ${e === i+1 ? 'bg-[#E50914] text-white shadow-[0_0_15px_rgba(229,9,20,0.4)]' : 'bg-[#222] text-gray-300 hover:bg-[#333]'}`}>
                                                        {i+1}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="pb-[80vh] w-full"></div>
                        </div>
                    </div>
                );
            };

            const SearchView = () => {
                const [query, setQuery] = useState('');
                const [results, setResults] = useState([]);
                const [loading, setLoading] = useState(false);

                useEffect(() => {
                    if (!query.trim()) { setResults([]); return; }
                    const timer = setTimeout(async () => {
                        setLoading(true);
                        try {
                            const res = await fetchAPI('/search/multi', { query, include_adult: false });
                            const filtered = (res.results || []).filter(item => item.media_type === 'movie' || item.media_type === 'tv');
                            setResults(filtered);
                        } catch(e) { console.error(e); } 
                        finally { setLoading(false); }
                    }, 500);
                    return () => clearTimeout(timer);
                }, [query]);

                return (
                    <div className="pb-24 min-h-screen">
                        <AdBanner />
                        <AppHeader langObj={t} onLangClick={() => setShowLangModal(true)} />
                        
                        <div className="pt-4 px-4 mb-6">
                            <div className="relative">
                                <input type="text" value={query} onChange={(e) => setQuery(e.target.value)}
                                    placeholder={t.searchPlaceholder}
                                    className="w-full solid-panel border border-[#333] text-white p-4 pr-12 rounded-xl outline-none focus:border-[#E50914] transition-colors font-bold"
                                    dir={isRTL ? 'rtl' : 'ltr'} />
                                <div className={`absolute top-4 ${isRTL ? 'left-4' : 'right-4'} text-gray-500`}>
                                    <Icons.Search />
                                </div>
                            </div>
                        </div>
                        {loading ? <Loader /> : (
                            <div className="px-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                                {results.map((item, idx) => (
                                    <div key={`${item.id}-${idx}`} className="w-full flex justify-center">
                                        <MovieCard item={item} langObj={t} onClick={(id, type) => navigate('details', {id, type})} typeOverride={item.media_type} />
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            const SeeAllView = () => {
                const { section, filter: currentFilter } = currentParams;
                const [items, setItems] = useState([]);
                const [pageNo, setPageNo] = useState(1);
                const [loading, setLoading] = useState(false);
                const [hasMore, setHasMore] = useState(true);

                const loadMore = async () => {
                    if (loading || !hasMore) return;
                    setLoading(true);
                    try {
                        let res;
                        if (currentFilter === 'all') {
                            const [r1, r2] = await Promise.all([
                                fetchAPI(`/discover/movie`, { with_genres: section.genreId, page: pageNo, sort_by: 'popularity.desc' }),
                                fetchAPI(`/discover/tv`, { with_genres: section.genreId, page: pageNo, sort_by: 'popularity.desc' })
                            ]);
                            const mixed = [];
                            const max = Math.max(r1.results?.length || 0, r2.results?.length || 0);
                            for(let i=0; i<max; i++){
                                if(r1.results?.[i]) mixed.push({...r1.results[i], media_type: 'movie'});
                                if(r2.results?.[i]) mixed.push({...r2.results[i], media_type: 'tv'});
                            }
                            res = { results: mixed, total_pages: Math.max(r1.total_pages || 1, r2.total_pages || 1) };
                        } else {
                            res = await fetchAPI(`/discover/${currentFilter}`, { with_genres: section.genreId, page: pageNo, sort_by: 'popularity.desc' });
                        }
                        
                        if (res.results && res.results.length > 0) {
                            setItems(prev => [...prev, ...res.results]);
                            setPageNo(p => p + 1);
                        } else {
                            setHasMore(false);
                        }
                        if (pageNo >= res.total_pages) setHasMore(false);
                    } catch (e) { console.error(e); } 
                    finally { setLoading(false); }
                };

                useEffect(() => { loadMore(); }, []);

                return (
                    <div className="pb-24 min-h-screen">
                        <AdBanner />
                        <AppHeader langObj={t} onLangClick={() => setShowLangModal(true)} />
                        
                        <div className="px-4 mt-4 mb-6 flex items-center gap-3 sticky top-[115px] z-40 py-3 border-b border-[#222] bg-[#080808]/90 backdrop-blur">
                            <button onClick={() => navigate('home')} className="p-2 bg-[#141414] rounded-full text-white border border-[#333]">
                                <Icons.Back rtl={isRTL} />
                            </button>
                            <h2 className="text-xl font-black uppercase text-white">{t.genres[section.id]}</h2>
                        </div>
                        <div className="px-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                            {items.map((item, idx) => (
                                <div key={`${item.id}-${idx}`} className="w-full flex justify-center">
                                    <MovieCard item={item} langObj={t} onClick={(id, type) => navigate('details', {id, type})} typeOverride={item.media_type || (currentFilter !== 'all' ? currentFilter : null)} />
                                </div>
                            ))}
                        </div>
                        {loading && <Loader />}
                        {hasMore && !loading && (
                            <div className="px-4 mt-8">
                                <button onClick={loadMore} className="w-full py-4 bg-[#141414] text-white font-black uppercase tracking-widest rounded-xl border border-[#333] hover:border-[#E50914] transition-colors shadow-md">
                                    {t.loadMore}
                                </button>
                            </div>
                        )}
                    </div>
                );
            };

            const SavedView = () => {
                const [localFilter, setLocalFilter] = useState('all');
                const displayList = useMemo(() => {
                    if (localFilter === 'all') return watchlist;
                    return watchlist.filter(w => w._type === localFilter);
                }, [watchlist, localFilter]);

                return (
                    <div className="pb-24 min-h-screen">
                        <AdBanner />
                        <AppHeader langObj={t} onLangClick={() => setShowLangModal(true)} />
                        
                        <div className="pt-6 px-4">
                            <h2 className="text-2xl font-black mb-6 uppercase tracking-wider">{t.saved}</h2>
                            <div className="flex gap-2 mb-6 overflow-x-auto hide-scrollbar">
                                {['all', 'movie', 'tv'].map(f => (
                                    <button key={f} onClick={() => setLocalFilter(f)} 
                                        className={`px-5 py-2 rounded-md text-xs tracking-wider uppercase ${localFilter === f ? 'active' : ''} tab-btn`}>
                                        {f === 'all' ? t.all : f === 'movie' ? t.movies : t.tv}
                                    </button>
                                ))}
                            </div>
                            {displayList.length === 0 ? (
                                <div className="text-center text-gray-500 mt-20 font-bold">{t.noSaved}</div>
                            ) : (
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                                    {displayList.map((item, idx) => (
                                        <div key={`${item.id}-${idx}`} className="w-full relative flex justify-center">
                                            <MovieCard item={item} langObj={t} onClick={(id, type) => navigate('details', {id, type})} typeOverride={item._type} />
                                            <button onClick={(e) => { e.stopPropagation(); toggleSave(item, item._type); }} className="absolute top-2 left-3 z-10 p-1.5 bg-[#E50914] rounded-md shadow-lg text-white">
                                                <Icons.Save />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            let Content = HomeView;
            if (page === 'details') Content = DetailsView;
            else if (page === 'player') Content = PlayerView;
            else if (page === 'search') Content = SearchView;
            else if (page === 'saved') Content = SavedView;
            else if (page === 'seeAll') Content = SeeAllView;

            return (
                <div className={`min-h-screen bg-black text-white font-sans ${isRTL ? 'rtl' : 'ltr'}`} dir={isRTL ? 'rtl' : 'ltr'}>
                    <Content key={page + (currentParams?.id || '')} />
                    {page !== 'player' && (
                        <div className="fixed bottom-0 left-0 right-0 solid-panel border-t border-[#222] pb-safe z-50">
                            <div className="flex justify-around items-center p-3">
                                <button onClick={() => navigate('home')} className={`flex flex-col items-center gap-1 p-2 w-20 transition-colors ${page === 'home' || page === 'seeAll' ? 'primary-red-text' : 'text-gray-500'}`}>
                                    <Icons.Home /> <span className="text-[10px] font-bold uppercase tracking-wider">{t.home}</span>
                                </button>
                                <button onClick={() => navigate('search')} className={`flex flex-col items-center gap-1 p-2 w-20 transition-colors ${page === 'search' ? 'primary-red-text' : 'text-gray-500'}`}>
                                    <Icons.Search /> <span className="text-[10px] font-bold uppercase tracking-wider">{t.search}</span>
                                </button>
                                <button onClick={() => navigate('saved')} className={`flex flex-col items-center gap-1 p-2 w-20 transition-colors ${page === 'saved' ? 'primary-red-text' : 'text-gray-500'}`}>
                                    <Icons.Save /> <span className="text-[10px] font-bold uppercase tracking-wider">{t.saved}</span>
                                </button>
                            </div>
                        </div>
                    )}
                    {showLangModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex justify-center items-center p-4">
                            <div className="solid-panel w-full max-w-sm rounded-2xl border border-[#333] shadow-2xl flex flex-col max-h-[80vh]">
                                <div className="p-4 border-b border-[#333] flex justify-between items-center">
                                    <h2 className="text-lg font-bold text-white uppercase tracking-wider">Language</h2>
                                    <button onClick={() => setShowLangModal(false)} className="text-gray-400 hover:text-white p-1 bg-[#222] rounded-full">
                                        <Icons.Close />
                                    </button>
                                </div>
                                <div className="p-4 grid grid-cols-2 gap-3 overflow-y-auto custom-scrollbar flex-1">
                                    {Object.keys(i18n).map(k => (
                                        <button key={k} onClick={() => changeLang(k)} className={`w-full flex flex-col items-center justify-center gap-2 px-3 py-3 rounded-xl transition-all font-bold text-sm border ${lang === k ? 'bg-[#E50914] text-white border-[#E50914] shadow-md' : 'hover:bg-[#222] text-gray-300 border-[#333] solid-panel'}`}>
                                            <div className="w-8 h-5.5 rounded-sm overflow-hidden flex items-center justify-center shadow-md bg-[#222]">
                                                {i18n[k].flag}
                                            </div>
                                            <span className="text-xs truncate">{i18n[k].name}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
